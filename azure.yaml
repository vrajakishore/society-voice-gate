# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: society-voice-gate
metadata:
  template: society-voice-gate

# No hosted services — app runs locally with Dev Tunnels.
# azd provisions only the Azure resources (AI Services, ACS, RBAC).

hooks:
  preprovision:
    shell: sh
    run: hooks/preprovision.sh
  postprovision:
    shell: sh
    run: hooks/postprovision.sh
